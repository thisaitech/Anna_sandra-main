<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev login — Sandra ERP</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 4rem auto; padding: 0 1rem; }
    code { background: #f1f5f9; padding: 0.15rem 0.4rem; border-radius: 4px; }
    button { margin-top: 1rem; padding: 0.75rem 1.25rem; background: #3b82f6; color: #fff; border: 0; border-radius: 8px; cursor: pointer; font-size: 1rem; width: 100%; }
    p { color: #475569; line-height: 1.5; }
    .note { font-size: 0.875rem; background: #fef3c7; border: 1px solid #fcd34d; padding: 0.75rem; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Local dev login</h1>
  <p class="note">Use this URL (not <code>/dev-login.html</code>). The SPA server redirects that path to the main app.</p>
  <p>No Firebase account is created. Session is stored only in this browser.</p>
  <p><strong>Email:</strong> <code>dev@sandra.local</code><br />
     <strong>Password:</strong> <code>dev123456</code></p>
  <button type="button" id="go">Sign in &amp; open app</button>
  <p style="margin-top:1.5rem;font-size:0.875rem;">Or use <a href="/login">/login</a> with the same credentials.</p>
  <script>
    document.getElementById('go').onclick = function () {
      var u = {
        uid: 'dev-local-user',
        email: 'dev@sandra.local',
        displayName: 'Dev User',
        companyName: 'Sandra Software',
        companyId: 'dev-company-local',
        role: 'super_admin',
        status: 'active',
        createdAt: new Date().toISOString()
      };
      localStorage.setItem('devAuth', '1');
      localStorage.setItem('user', JSON.stringify(u));
      location.href = '/';
    };
  </script>
</body>
</html>
